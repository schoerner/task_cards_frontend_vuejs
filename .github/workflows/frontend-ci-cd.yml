name: CI/CD Frontend

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/task-cards-frontend

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v5

      - name: Node.js einrichten
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Tests ausführen
        run: |
          if npm run | grep -q " test"; then
            npm test -- --runInBand
          else
            echo "Kein npm test-Script vorhanden - überspringe Tests."
          fi

      - name: Bei GHCR anmelden
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker-Metadaten erzeugen
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker-Image bauen und pushen
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=/api/v1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Per SSH auf dem Server deployen
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            docker compose --env-file /opt/apps/.env \
              -f /opt/apps/task/compose.yaml \
              -f /opt/apps/task/compose.server.yaml \
              pull task_frontend

            docker compose --env-file /opt/apps/.env \
              -f /opt/apps/task/compose.yaml \
              -f /opt/apps/task/compose.server.yaml \
              up -d --force-recreate task_frontend